<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>五子棋</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh;position:absolute;top:0;left:0}
.screen.active{display:flex}
#hs{background:radial-gradient(ellipse at center,#16213e 0%,#0f0e17 100%)}
.htitle{font-size:88px;font-weight:900;letter-spacing:16px;color:#f0c040;text-shadow:0 0 40px #f0c04077,0 4px 12px #000;margin-bottom:52px}
.hbtn{position:absolute;top:24px;right:24px;background:transparent;border:2px solid #f0c040;color:#f0c040;padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px;transition:.2s}
.hbtn:hover{background:#f0c04022}
.dg{display:flex;gap:20px;margin-bottom:44px}
.dbtn{padding:14px 36px;border-radius:30px;border:2px solid #555;background:transparent;color:#aaa;font-size:18px;cursor:pointer;transition:.25s;letter-spacing:3px}
.dbtn:hover{border-color:#f0c040;color:#f0c040}
.dbtn.sel{background:#f0c040;color:#1a1a2e;border-color:#f0c040;font-weight:700;box-shadow:0 0 20px #f0c04055}
.sbtn{padding:18px 72px;border-radius:40px;border:none;background:linear-gradient(135deg,#f0c040,#e08000);color:#1a1a2e;font-size:22px;font-weight:700;cursor:pointer;letter-spacing:5px;box-shadow:0 4px 24px #f0c04055;transition:.2s}
.sbtn:hover{transform:translateY(-3px);box-shadow:0 8px 32px #f0c04099}
.sbtn:active{transform:translateY(0)}
#ds{background:#0f0e17;gap:36px}
.dtitle{font-size:30px;color:#f0c040;letter-spacing:6px}
.cwrap{width:130px;height:130px;perspective:600px}
.coin{width:130px;height:130px;position:relative;transform-style:preserve-3d}
.coin.go{animation:cs 1.4s cubic-bezier(.3,.8,.4,1) forwards}
@keyframes cs{0%{transform:rotateY(0)}100%{transform:rotateY(1440deg)}}
.cf,.cb{position:absolute;inset:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:62px;backface-visibility:hidden}
.cf{background:radial-gradient(circle at 35% 35%,#555,#111);border:4px solid #666}
.cb{background:radial-gradient(circle at 35% 35%,#fff,#ccc);border:4px solid #aaa;transform:rotateY(180deg)}
.dres{font-size:23px;min-height:32px;opacity:0;transition:.5s;letter-spacing:2px;color:#f0c040}
.dres.vis{opacity:1}
.cfbtn{padding:14px 56px;border-radius:30px;border:none;background:#f0c040;color:#1a1a2e;font-size:20px;font-weight:700;cursor:pointer;letter-spacing:3px;display:none;transition:.2s}
.cfbtn:hover{background:#ffd060;transform:translateY(-2px)}
.bk{font-size:13px;color:#444;cursor:pointer;margin-top:4px}.bk:hover{color:#777}
#gs{flex-direction:row;gap:32px;background:#0d1117}
.gsd{width:196px;display:flex;flex-direction:column;gap:16px}
.pcrd{background:#161b22;border-radius:14px;padding:20px;text-align:center;border:2px solid transparent;transition:.3s}
.pcrd.on{border-color:#f0c040;box-shadow:0 0 20px #f0c04044}
.pi{font-size:40px;margin-bottom:6px}
.pl{font-size:12px;color:#555;letter-spacing:2px}
.pn{font-size:16px;color:#ccc;font-weight:600;margin-top:4px}
.tb{background:#161b22;border-radius:14px;padding:16px;text-align:center}
.tl{font-size:11px;color:#444;letter-spacing:2px;margin-bottom:6px}
.tv{font-size:34px;font-weight:700;color:#f0c040;letter-spacing:4px}
.cl{display:flex;flex-direction:column;gap:10px}
.cbtn{padding:12px;border-radius:10px;border:1.5px solid #30363d;background:transparent;color:#bbb;font-size:15px;cursor:pointer;letter-spacing:1px;transition:.2s}
.cbtn:hover{border-color:#f0c040;color:#f0c040;background:#f0c04011}
.cbtn.r:hover{border-color:#e05050;color:#e05050;background:#e0505011}
canvas{display:block;border-radius:6px;box-shadow:0 0 48px #0009}
.ov{position:fixed;inset:0;background:#000c;display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.ov.open{display:flex}
.md{background:#161b22;border:1px solid #30363d;border-radius:18px;padding:36px 44px;text-align:center;min-width:320px;max-width:500px;animation:pp .28s ease}
@keyframes pp{from{transform:scale(.82);opacity:0}to{transform:scale(1);opacity:1}}
.md h2{font-size:26px;color:#f0c040;letter-spacing:3px;margin-bottom:8px}
.mds{font-size:14px;color:#666;margin-bottom:20px}
.ri{font-size:64px;margin-bottom:12px}
.mbs{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}
.mb{padding:12px 28px;border-radius:22px;border:none;font-size:16px;cursor:pointer;font-weight:600;letter-spacing:1px;transition:.2s}
.mb.g{background:#f0c040;color:#1a1a2e}.mb.g:hover{background:#ffd060}
.mb.s{background:#21262d;color:#bbb}.mb.s:hover{background:#2d333b}
.mb.r{background:#2a1212;color:#e05050;border:1px solid #e0505040}.mb.r:hover{background:#3a1a1a}
.hl{max-height:380px;overflow-y:auto;text-align:left;margin-top:4px}
.hl::-webkit-scrollbar{width:4px}
.hl::-webkit-scrollbar-thumb{background:#2d333b;border-radius:4px}
.hi{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #21262d}
.hi:last-child{border-bottom:none}
.hb{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:700;flex-shrink:0}
.bw{background:#1d3a26;color:#4caf50}.bl{background:#3a1d1d;color:#f44336}.bd{background:#2d2a1a;color:#ff9800}
.r1{font-size:13px;color:#ccc}.r2{font-size:11px;color:#555;margin-top:2px}
.he{text-align:center;color:#444;padding:36px 0;font-size:15px}
</style>
</head>
<body>
<div id="hs" class="screen active">
  <button class="hbtn" onclick="openHist()">历史记录</button>
  <div class="htitle">五子棋</div>
  <div class="dg">
    <button class="dbtn sel" data-d="easy"   onclick="setDiff(this)">简单</button>
    <button class="dbtn"     data-d="normal" onclick="setDiff(this)">普通</button>
    <button class="dbtn"     data-d="hard"   onclick="setDiff(this)">困难</button>
  </div>
  <button class="sbtn" onclick="beginDraw()">开始游戏</button>
</div>
<div id="ds" class="screen">
  <div class="dtitle">抽签 · 决定棋色</div>
  <div class="cwrap"><div class="coin" id="coin"><div class="cf">⚫</div><div class="cb">⚪</div></div></div>
  <div class="dres" id="dr"></div>
  <button class="cfbtn" id="cfb" onclick="startGame()">确认，开始对局</button>
  <div class="bk" onclick="goHome()">← 返回主菜单</div>
</div>
<div id="gs" class="screen">
  <div class="gsd">
    <div class="pcrd" id="cb"><div class="pi">⚫</div><div class="pl">黑棋</div><div class="pn" id="nb">-</div></div>
    <div class="tb"><div class="tl">对局计时</div><div class="tv" id="tv">00:00</div></div>
    <div class="cl">
      <button class="cbtn"   onclick="doUndo()">↩ 悔棋</button>
      <button class="cbtn r" onclick="askResign()">🏳 认输</button>
      <button class="cbtn"   onclick="goHome()">⌂ 返回主菜单</button>
    </div>
  </div>
  <canvas id="board" width="608" height="608"></canvas>
  <div class="gsd">
    <div class="pcrd" id="cw"><div class="pi">⚪</div><div class="pl">白棋</div><div class="pn" id="nw">-</div></div>
  </div>
</div>
<div class="ov" id="oh">
  <div class="md" style="max-width:460px">
    <h2>历史记录</h2><div class="mds">最近 20 局</div>
    <div class="hl" id="hl"></div>
    <div class="mbs"><button class="mb r" onclick="clearHist()">清空记录</button><button class="mb s" onclick="co('oh')">关闭</button></div>
  </div>
</div>
<div class="ov" id="or">
  <div class="md">
    <div class="ri">🏳</div><h2>确认认输？</h2><div class="mds">本局将记录为失败</div>
    <div class="mbs"><button class="mb r" onclick="doResign()">确认认输</button><button class="mb s" onclick="co('or')">继续对局</button></div>
  </div>
</div>
<div class="ov" id="ore">
  <div class="md">
    <div class="ri" id="ricon"></div>
    <h2 id="rtit"></h2><div class="mds" id="rsub"></div>
    <div class="mbs"><button class="mb g" onclick="again()">再来一局</button><button class="mb s" onclick="goHome()">返回主菜单</button></div>
  </div>
</div><script>
'use strict';
const N=15,CELL=40,PAD=24;
let diff='easy',pCol='black',aiCol='white';
let board=[],mh=[],turn='black',live=false,aiG=false;
let tS=0,tH=null,wC=null,hov=null;
const V={black:1,white:2};
const cv=document.getElementById('board'),cx=cv.getContext('2d');

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function oo(id){document.getElementById(id).classList.add('open')}
function co(id){document.getElementById(id).classList.remove('open')}

function goHome(){
  co('ore');co('or');stopT();live=false;aiG=false;
  cv.onclick=null;cv.onmousemove=null;cv.onmouseleave=null;
  show('hs');
}

function setDiff(btn){
  document.querySelectorAll('.dbtn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');diff=btn.dataset.d;
}

function beginDraw(){
  show('ds');
  let re=document.getElementById('dr'),cb=document.getElementById('cfb');
  re.classList.remove('vis');re.textContent='';cb.style.display='none';
  pCol=Math.random()<.5?'black':'white';
  aiCol=pCol==='black'?'white':'black';
  let coin=document.getElementById('coin');
  coin.style.animation='none';coin.offsetHeight;
  coin.classList.remove('go');coin.offsetHeight;coin.classList.add('go');
  setTimeout(()=>{
    re.textContent=pCol==='black'?'⚫ 您是黑棋，先手出击！':'⚪ 您是白棋，AI先手，静候时机';
    re.classList.add('vis');cb.style.display='inline-block';
  },1500);
}

function startGame(){
  board=Array.from({length:N},()=>Array(N).fill(0));
  mh=[];wC=null;turn='black';live=true;aiG=false;
  let dl={easy:'简单',normal:'普通',hard:'困难'}[diff];
  document.getElementById('nb').textContent=pCol==='black'?'玩家':`AI·${dl}`;
  document.getElementById('nw').textContent=pCol==='white'?'玩家':`AI·${dl}`;
  updC();startT();show('gs');drawB();
  cv.onclick=clkH;cv.onmousemove=mvH;cv.onmouseleave=()=>{hov=null;drawB()};
  if(aiCol==='black')setTimeout(doAI,400);
}

function updC(){
  document.getElementById('cb').classList.toggle('on',turn==='black');
  document.getElementById('cw').classList.toggle('on',turn==='white');
}

function startT(){stopT();tS=0;rdT();tH=setInterval(()=>{tS++;rdT()},1000)}
function stopT(){if(tH){clearInterval(tH);tH=null}}
function rdT(){let m=String(Math.floor(tS/60)).padStart(2,'0'),s=String(tS%60).padStart(2,'0');document.getElementById('tv').textContent=`${m}:${s}`}
function fmtT(t){return`${Math.floor(t/60)}分${t%60}秒`}

function pos(r,c){return{x:PAD+c*CELL,y:PAD+r*CELL}}
function toRC(px,py){return{r:Math.round((py-PAD)/CELL),c:Math.round((px-PAD)/CELL)}}

function drawB(){
  cx.fillStyle='#c8a050';cx.fillRect(0,0,608,608);
  cx.strokeStyle='#7a5000';cx.lineWidth=1;
  for(let i=0;i<N;i++){
    let a=pos(0,i),b=pos(N-1,i);cx.beginPath();cx.moveTo(a.x,a.y);cx.lineTo(b.x,b.y);cx.stroke();
    let c=pos(i,0),d=pos(i,N-1);cx.beginPath();cx.moveTo(c.x,c.y);cx.lineTo(d.x,d.y);cx.stroke();
  }
  let p0=pos(0,0),p1=pos(N-1,N-1);
  cx.strokeStyle='#5a3800';cx.lineWidth=2;cx.strokeRect(p0.x,p0.y,p1.x-p0.x,p1.y-p0.y);
  cx.fillStyle='#5a3800';
  [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]].forEach(([r,c])=>{
    let{x,y}=pos(r,c);cx.beginPath();cx.arc(x,y,r===7&&c===7?5:4,0,Math.PI*2);cx.fill();
  });
  if(hov&&live&&turn===pCol&&!aiG){
    let{r,c}=hov;
    if(r>=0&&r<N&&c>=0&&c<N&&!board[r][c]){
      let{x,y}=pos(r,c);
      cx.globalAlpha=.3;cx.fillStyle=pCol==='black'?'#000':'#fff';
      cx.beginPath();cx.arc(x,y,CELL/2-2,0,Math.PI*2);cx.fill();cx.globalAlpha=1;
    }
  }
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(board[r][c])dp(r,c,board[r][c]===1?'black':'white');
  if(mh.length){
    let lm=mh[mh.length-1],{x,y}=pos(lm.r,lm.c);
    cx.strokeStyle='#f00';cx.lineWidth=2;cx.beginPath();cx.arc(x,y,5,0,Math.PI*2);cx.stroke();
  }
  if(wC){
    wC.forEach(({r,c})=>{
      let{x,y}=pos(r,c);
      cx.strokeStyle='#ff4';cx.lineWidth=3;cx.beginPath();cx.arc(x,y,CELL/2-1,0,Math.PI*2);cx.stroke();
    });
  }
}

function dp(r,c,col){
  let{x,y}=pos(r,c),rad=CELL/2-2;
  let g=cx.createRadialGradient(x-rad*.3,y-rad*.3,rad*.05,x,y,rad);
  if(col==='black'){g.addColorStop(0,'#555');g.addColorStop(1,'#000')}
  else{g.addColorStop(0,'#fff');g.addColorStop(1,'#bbb')}
  cx.beginPath();cx.arc(x,y,rad,0,Math.PI*2);cx.fillStyle=g;cx.fill();
  cx.strokeStyle=col==='black'?'#222':'#999';cx.lineWidth=.5;cx.stroke();
}

function clkH(e){
  if(!live||turn!==pCol||aiG)return;
  let rect=cv.getBoundingClientRect(),{r,c}=toRC(e.clientX-rect.left,e.clientY-rect.top);
  if(r<0||r>=N||c<0||c>=N||board[r][c])return;
  place(r,c,pCol);
}
function mvH(e){
  if(!live||turn!==pCol||aiG){hov=null;return}
  let rect=cv.getBoundingClientRect();hov=toRC(e.clientX-rect.left,e.clientY-rect.top);drawB();
}

function place(r,c,col){
  board[r][c]=V[col];mh.push({r,c,who:col});drawB();
  let w=chkW(r,c,V[col]);
  if(w){wC=w;drawB();live=false;stopT();setTimeout(()=>showRes(col===pCol?'win':'lose'),500);return}
  if(full()){live=false;stopT();setTimeout(()=>showRes('draw'),400);return}
  turn=turn==='black'?'white':'black';updC();
  if(turn===aiCol){aiG=true;setTimeout(doAI,diff==='hard'?320:150)}
}

function full(){for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!board[r][c])return false;return true}

const DIRS=[[0,1],[1,0],[1,1],[1,-1]];
function chkW(r,c,v){
  for(let[dr,dc]of DIRS){
    let cs=[{r,c}];
    for(let k=1;k<5;k++){let nr=r+dr*k,nc=c+dc*k;if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==v)break;cs.push({r:nr,c:nc})}
    for(let k=1;k<5;k++){let nr=r-dr*k,nc=c-dc*k;if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==v)break;cs.push({r:nr,c:nc})}
    if(cs.length>=5)return cs;
  }
  return null;
}

function doUndo(){
  if(!live||aiG||!mh.length)return;
  while(mh.length){let mv=mh.pop();board[mv.r][mv.c]=0;if(mv.who===pCol)break}
  turn=pCol;wC=null;updC();drawB();
}

function askResign(){if(live)oo('or')}
function doResign(){co('or');live=false;stopT();showRes('resign')}

function showRes(type){
  const M={win:['🏆','你赢了！'],lose:['😢','你输了'],draw:['🤝','平局！'],resign:['🏳','认输']};
  let[ic,ti]=M[type];
  document.getElementById('ricon').textContent=ic;
  document.getElementById('rtit').textContent=ti;
  document.getElementById('rsub').textContent='用时：'+fmtT(tS);
  oo('ore');saveRec(type);
}
function again(){co('ore');beginDraw()}

function saveRec(type){
  let recs=JSON.parse(localStorage.getItem('gz_h')||'[]');
  let dl={easy:'简单',normal:'普通',hard:'困难'}[diff];
  let lb={win:'胜利',lose:'失败',draw:'平局',resign:'认输'}[type];
  let n=new Date(),dt=`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')} ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  recs.unshift({type,lb,dl,pCol,time:tS,dt});
  if(recs.length>20)recs.length=20;
  localStorage.setItem('gz_h',JSON.stringify(recs));
}
function openHist(){renderH();oo('oh')}
function renderH(){
  let recs=JSON.parse(localStorage.getItem('gz_h')||'[]');
  let el=document.getElementById('hl');
  if(!recs.length){el.innerHTML='<div class="he">暂无历史记录</div>';return}
  el.innerHTML=recs.map(rec=>{
    let cls=rec.type==='win'?'bw':rec.type==='draw'?'bd':'bl';
    let cs=rec.pCol==='black'?'⚫黑棋':'⚪白棋';
    return`<div class="hi"><span class="hb ${cls}">${rec.lb}</span><div><div class="r1">${rec.dl} · ${cs} · ${fmtT(rec.time)}</div><div class="r2">${rec.dt}</div></div></div>`;
  }).join('');
}
function clearHist(){if(confirm('确定清空所有记录？')){localStorage.removeItem('gz_h');renderH()}}

const AV=()=>V[aiCol],PV=()=>V[pCol];

// 连续计数
function cntD(r,c,dr,dc,v){
  let n=0;
  for(let k=1;k<6;k++){let nr=r+dr*k,nc=c+dc*k;if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]!==v)break;n++}
  return n;
}

// 检查某方向延伸steps步后是否为空
function openEnd(r,c,dr,dc,steps){
  let nr=r+dr*steps,nc=c+dc*steps;
  return nr>=0&&nr<N&&nc>=0&&nc<N&&board[nr][nc]===0;
}

// 棋型评分: cnt=连子数, opens=开放端数(0/1/2)
// 活四=双开四子, 死四=单开四子, 活三=双开三子, 依此类推
function pScore(cnt,opens){
  if(cnt>=5) return 1000000;   // 五连 必胜
  if(cnt===4) return opens===2?50000:opens===1?5000:50;   // 活四/死四
  if(cnt===3) return opens===2?3000:opens===1?300:10;     // 活三/死三
  if(cnt===2) return opens===2?100:opens===1?10:1;        // 活二/死二
  return opens===2?3:0;
}

// 计算落在(r,c)处对颜色v的总棋型得分
function scoreAt(r,c,v){
  let s=0;
  for(let[dr,dc]of DIRS){
    let f=cntD(r,c,dr,dc,v),b=cntD(r,c,-dr,-dc,v);
    let o1=openEnd(r,c,dr,dc,f+1)?1:0;
    let o2=openEnd(r,c,-dr,-dc,b+1)?1:0;
    s+=pScore(1+f+b,o1+o2);
  }
  return s;
}

// 全盘静态估值 (AI正, 玩家负)
function evalB(){
  let s=0;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(!board[r][c]) continue;
    let sc=scoreAt(r,c,board[r][c]);
    s+=board[r][c]===AV()?sc:-sc;
  }
  return s;
}

// 寻找能凑成5连的空格
function findW(v){
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(board[r][c]) continue;
    board[r][c]=v;
    let ok=false;
    for(let[dr,dc]of DIRS){if(1+cntD(r,c,dr,dc,v)+cntD(r,c,-dr,-dc,v)>=5){ok=true;break}}
    board[r][c]=0; if(ok) return{r,c};
  }
  return null;
}

// 寻找活四/死四威胁
function findFour(v){
  let bv=0,bm=null;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(board[r][c]) continue;
    board[r][c]=v; let sc=scoreAt(r,c,v); board[r][c]=0;
    if(sc>=5000&&sc>bv){bv=sc;bm={r,c}}
  }
  return bm;
}

// 寻找活三威胁
function findThree(v){
  let bv=0,bm=null;
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(board[r][c]) continue;
    board[r][c]=v; let sc=scoreAt(r,c,v); board[r][c]=0;
    if(sc>=3000&&sc>bv){bv=sc;bm={r,c}}
  }
  return bm;
}

// 收集候选落点
function cands(rad,lim){
  let set=new Set(),res=[];
  for(let r=0;r<N;r++) for(let c=0;c<N;c++){
    if(!board[r][c]) continue;
    for(let dr=-rad;dr<=rad;dr++) for(let dc=-rad;dc<=rad;dc++){
      let nr=r+dr,nc=c+dc;
      if(nr<0||nr>=N||nc<0||nc>=N||board[nr][nc]) continue;
      let k=nr*N+nc; if(!set.has(k)){set.add(k);res.push({r:nr,c:nc})}
    }
  }
  if(!res.length) return[{r:7,c:7}];
  if(lim&&res.length>lim) res.length=lim;
  return res;
}

// 预计算分值并排序（优先尝试高价值落点，加速剪枝）
function sortedCands(rad,lim){
  let pool=cands(rad);
  let sc=pool.map(({r,c})=>{
    board[r][c]=AV(); let a=scoreAt(r,c,AV()); board[r][c]=0;
    board[r][c]=PV(); let d=scoreAt(r,c,PV()); board[r][c]=0;
    return{r,c,s:a*1.2+d};
  });
  sc.sort((a,b)=>b.s-a.s);
  if(lim) sc.length=Math.min(sc.length,lim);
  return sc.map(({r,c})=>({r,c}));
}

// 综合最佳落点（普通模式用）
function bestS(){
  return sortedCands(2,80)[0]||{r:7,c:7};
}

function doAI(){
  if(!live||turn!==aiCol){aiG=false;return}
  let mv;
  if(diff==='easy')       mv=aiE();
  else if(diff==='normal')mv=aiN();
  else                    mv=aiH();
  aiG=false; if(mv) place(mv.r,mv.c,aiCol);
}

// 简单: 必胜必堵, 偶尔拦截4连, 其余随机
function aiE(){
  let w=findW(PV()); if(w&&Math.random()<.5) return w;
  let pool=cands(2);
  return pool[Math.floor(Math.random()*pool.length)]||{r:7,c:7};
}

// 普通: 必胜 > 堵胜 > 堵四 > 堵活三 > 最优分
function aiN(){
  let w=findW(AV()); if(w) return w;
  let b=findW(PV()); if(b) return b;
  let bf=findFour(PV()); if(bf) return bf;
  let bt=findThree(PV()); if(bt){
    // 同时检查自己能否打出活三
    let at=findThree(AV());
    let bsc=scoreAt(bt.r,bt.c,PV());
    if(at){let asc=scoreAt(at.r,at.c,AV()); if(asc>bsc) return at;}
    return bt;
  }
  return bestS();
}

// 困难: 必胜 > 堵胜 > Minimax深度4 + 棋步排序
function aiH(){
  let w=findW(AV()); if(w) return w;
  let b=findW(PV()); if(b) return b;
  return mmR(4);
}

// Minimax根节点（排序候选提升剪枝效率）
function mmR(depth){
  let pool=sortedCands(2,20);
  if(!pool.length) return{r:7,c:7};
  let bv=-Infinity,bm=pool[0];
  for(let{r,c}of pool){
    board[r][c]=AV();
    let v=mm(depth-1,-Infinity,Infinity,false,r,c,AV());
    board[r][c]=0;
    if(v>bv){bv=v;bm={r,c}}
  }
  return bm;
}

// Minimax + Alpha-Beta剪枝
function mm(depth,alpha,beta,maximize,lr,lc,lv){
  if(chkW(lr,lc,lv)) return maximize?-1000000:1000000;
  if(depth===0||full()) return evalB();
  let pool=cands(1).slice(0,16); if(!pool.length) return 0;
  if(maximize){
    let best=-Infinity;
    for(let{r,c}of pool){
      board[r][c]=AV(); let v=mm(depth-1,alpha,beta,false,r,c,AV()); board[r][c]=0;
      if(v>best)best=v; if(v>alpha)alpha=v; if(beta<=alpha)break;
    }
    return best;
  }else{
    let best=Infinity;
    for(let{r,c}of pool){
      board[r][c]=PV(); let v=mm(depth-1,alpha,beta,true,r,c,PV()); board[r][c]=0;
      if(v<best)best=v; if(v<beta)beta=v; if(beta<=alpha)break;
    }
    return best;
  }
}
